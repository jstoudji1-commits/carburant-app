services:
  - type: web
    name: carburant-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: j.stoudji1@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: REPORT_EMAIL
        value: j.stoudji1@gmail.com
