services:
  - type: web
    name: carburant-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: optiplein-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: OPTIPLEIN_DATA_DIR
        value: /var/data
      - key: OPTIPLEIN_BACKGROUND_UPDATE
        value: "true"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: optiplein5@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: REPORT_EMAIL
        value: optiplein5@gmail.com
