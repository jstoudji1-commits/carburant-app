<!DOCTYPE html>
<html>

<head>
    <title>Comparateur Carburant</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

table{
    border-collapse: collapse;
    width:100%;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
}

th{
    background:#f0f0f0;
}

.prix-marker{
    background:transparent;
    border:none;
}

.prix-bulle{

    background:white;

    border:2px solid #2563eb;

    border-radius:20px;

    padding:4px 8px;

    font-size:12px;

    font-weight:bold;

    text-align:center;

    white-space:nowrap;

    box-shadow:0 2px 6px rgba(0,0,0,0.25);

}

.carburant-boutons{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

.carburant-boutons input{
    position:absolute;
    opacity:0;
    pointer-events:none;
}

.carburant-boutons label{
    min-width:68px;
    padding:10px 14px;
    border:2px solid #214053;
    border-radius:8px;
    background:white;
    color:#214053;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,0.10);
    transition:
        background 0.2s ease,
        color 0.2s ease,
        border-color 0.2s ease,
        transform 0.2s ease;
}

.carburant-boutons label:hover{
    border-color:#49a334;
    color:#2f8f28;
}

.carburant-boutons input:checked + label{
    background:#49a334;
    border-color:#49a334;
    color:white;
    box-shadow:0 3px 8px rgba(73,163,52,0.35);
    transform:translateY(-1px);
}

#map{

    height:80vh;

    width:100%;

}

</style>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<meta
    name="viewport"
    content="width=device-width, initial-scale=1"
>
</head>

<body>

<div
    style="
        display:flex;
        align-items:center;
        justify-content:space-between;
        background:white;
        padding:10px 15px;
        border-bottom:1px solid #ddd;
        box-shadow:0 2px 8px rgba(0,0,0,0.05);
        position:sticky;
        top:0;
        z-index:1000;
    "
>

    <img
        src="/static/logo.png"
        alt="OptiPlein"
        style="
            height:55px;
            width:auto;
        "
    >

    <div
        style="
            display:flex;
            gap:15px;
            font-weight:bold;
            font-size:16px;
            align-items:center;
        "
    >

        <span>
            📍 {{ nombre_stations }}
        </span>

        <span
            style="
                color:#28a745;
            "
        >
            🏆 {{ prix_min }} €
        </span>

    </div>

</div>

<form
    method="get"
    style="
        padding:10px;
        display:flex;
        flex-wrap:wrap;
        gap:8px;
        align-items:center;
    "
>

    <input
        type="text"
        name="ville"
        placeholder="Ville ou code postal"
        style="
            flex:1;
            min-width:140px;
            padding:10px;
        "
    >

    <div class="carburant-boutons">

        <input
            type="radio"
            id="carburant-gazole"
            name="carburant"
            value="gazole"
            {% if carburant == "gazole" %}checked{% endif %}
        >
        <label for="carburant-gazole">
            Gazole
        </label>

        <input
            type="radio"
            id="carburant-e10"
            name="carburant"
            value="e10"
            {% if carburant == "e10" %}checked{% endif %}
        >
        <label for="carburant-e10">
            E10
        </label>

        <input
            type="radio"
            id="carburant-sp98"
            name="carburant"
            value="sp98"
            {% if carburant == "sp98" %}checked{% endif %}
        >
        <label for="carburant-sp98">
            SP98
        </label>

    </div>

    <select
        name="rayon"
        style="padding:10px;"
    >

        <option value="5">5 km</option>
        <option value="10" selected>10 km</option>
        <option value="20">20 km</option>
        <option value="50">50 km</option>

    </select>

    <input
        type="hidden"
        id="latitude"
        name="latitude"
    >

    <input
        type="hidden"
        id="longitude"
        name="longitude"
    >

    <button
        type="submit"
        style="
            padding:10px 15px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:6px;
        "
    >
        Rechercher
    </button>

</form>

<div
    style="
        padding:0 10px 10px 10px;
    "
>

    <button
        id="btn-position"
        style="
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
        "
    >
        📍 Autour de moi
    </button>

</div>

<p
    id="position"
    style="
        text-align:center;
        margin:5px 0;
        font-size:14px;
    "
></p>

<div
    id="map"
    style="
        height:75vh;
        width:100%;
    "
></div>
    <style>
#map {
    height: 80vh;
} 
   </style>

    
    <script>

// ========================
// Création de la carte
// ========================

var map = L.map('map').setView([46.6, 2.4], 6);

L.tileLayer(

    "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",

    {
        attribution: "",
        maxZoom: 19
    }

).addTo(map);
// ========================
// Marqueurs stations
// ========================

var markers = [];

{% for station in stations %}

{% if station.latitude and station.longitude %}

var prixIcon = L.divIcon({

    className: "prix-marker",

    html: `
        <div class="prix-bulle">
            {{ station.carburant_selectionne }}€
        </div>
    `,

    iconSize: [60, 24],
    iconAnchor: [30, 12]

});

var marker = L.marker(

    [
        {{ station.latitude }},
        {{ station.longitude }}
    ],

    {
        icon: prixIcon
    }

)
.addTo(map)

.bindPopup(`

    <div
        style="
            text-align:center;
            min-width:220px;
        "
    >

        <strong>
            ⛽ {{ station.carburant_selectionne }} €
        </strong>

        <br><br>

        {% if station.distance %}
        📍 {{ station.distance }} km
        <br><br>
        {% endif %}

        <div
            style="
                display:flex;
                gap:10px;
                justify-content:center;
            "
        >

            <button

                onclick="ouvrirGoogleMaps(
                    {{ station.latitude }},
                    {{ station.longitude }}
                )"

                style="
                    padding:8px 12px;
                    background:#34a853;
                    color:white;
                    border:none;
                    border-radius:6px;
                    cursor:pointer;
                "

            >

                🗺 Google Maps

            </button>

            <button

                onclick="ouvrirWaze(
                    {{ station.latitude }},
                    {{ station.longitude }}
                )"

                style="
                    padding:8px 12px;
                    background:#33CCFF;
                    color:white;
                    border:none;
                    border-radius:6px;
                    cursor:pointer;
                "

            >

                🚗 Waze

            </button>

        </div>

    </div>

`);
markers.push(marker);

{% endif %}

{% endfor %}

// ========================
// Zoom automatique
// ========================

if (markers.length > 0) {

    var group = L.featureGroup(markers);

    map.fitBounds(
        group.getBounds(),
        {
            padding: [30, 30]
        }
    );
}

// ========================
// Géolocalisation utilisateur
// ========================

let latitudeUtilisateur = null;
let longitudeUtilisateur = null;

let utilisateurMarker = null;

var marqueurUtilisateur = null;
var animationPositionUtilisateur = null;
var suiviGeolocalisationId = null;

function deplacerMarqueurUtilisateur(
    nouvelleLatitude,
    nouvelleLongitude
) {

    if (animationPositionUtilisateur) {

        cancelAnimationFrame(
            animationPositionUtilisateur
        );

    }

    var depart = marqueurUtilisateur.getLatLng();
    var latitudeDepart = depart.lat;
    var longitudeDepart = depart.lng;
    var debutAnimation = performance.now();
    var dureeAnimation = 900;

    function animerPosition(tempsActuel) {

        var progression = Math.min(
            (tempsActuel - debutAnimation) / dureeAnimation,
            1
        );

        var progressionAdoucie =
            progression * (2 - progression);

        var latitudeActuelle =
            latitudeDepart
            + (nouvelleLatitude - latitudeDepart)
            * progressionAdoucie;

        var longitudeActuelle =
            longitudeDepart
            + (nouvelleLongitude - longitudeDepart)
            * progressionAdoucie;

        marqueurUtilisateur.setLatLng([
            latitudeActuelle,
            longitudeActuelle
        ]);

        if (progression < 1) {

            animationPositionUtilisateur =
                requestAnimationFrame(
                    animerPosition
                );

        }

    }

    animationPositionUtilisateur =
        requestAnimationFrame(
            animerPosition
        );

}

function demarrerGeolocalisation() {

    if (suiviGeolocalisationId !== null) {

        return;

    }

    suiviGeolocalisationId =
        navigator.geolocation.watchPosition(

        function(position) {

            latitudeUtilisateur =
    position.coords.latitude;

            longitudeUtilisateur =
    position.coords.longitude;

            document.getElementById(
                "latitude"
            ).value = latitudeUtilisateur;

            document.getElementById(
                "longitude"
            ).value = longitudeUtilisateur;

            document.getElementById(
                "position"
            ).innerHTML =
                "Position : "
                + latitudeUtilisateur.toFixed(5)
                + ", "
                + longitudeUtilisateur.toFixed(5);

            if (marqueurUtilisateur) {

                deplacerMarqueurUtilisateur(
                    latitudeUtilisateur,
                    longitudeUtilisateur
                );

                map.panTo(
                    [
                        latitudeUtilisateur,
                        longitudeUtilisateur
                    ],
                    {
                        animate: true,
                        duration: 0.8
                    }
                );

            } else {

                var userIcon = L.divIcon({

                    html:
                        '<div style="width:12px;height:12px;border-radius:50%;background:#007bff;border:2px solid white;box-shadow:0 0 7px rgba(0,0,0,0.28);"></div>',

                    className: "",

                    iconSize: [16,16],
                    iconAnchor: [8,8]

                });

                marqueurUtilisateur =
                    L.marker(

                        [
                            latitudeUtilisateur,
                            longitudeUtilisateur
                        ],

                        {
                            icon: userIcon
                        }

                    )
                    .addTo(map)
                    .bindPopup(
                        "Vous êtes ici"
                    );

                map.setView(

                    [
                        latitudeUtilisateur,
                        longitudeUtilisateur
                    ],

                    12

                );

            }

        },

        function(error) {

            console.log(
                "GPS refusé ou indisponible"
            );

        },

        {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        }

    );

}

// Bouton "Autour de moi"

document
.getElementById("btn-position")
.addEventListener(
    "click",
    demarrerGeolocalisation
);

// Lancement automatique au chargement

 window.addEventListener(
    "load",
    demarrerGeolocalisation
);

function ouvrirGoogleMaps(
    latitudeStation,
    longitudeStation
) {

    const destination =
        latitudeStation + "," + longitudeStation;

    if (
        latitudeUtilisateur !== null
        &&
        longitudeUtilisateur !== null
    ) {

        const origine =
            latitudeUtilisateur
            + ","
            + longitudeUtilisateur;

        window.open(

            "https://www.google.com/maps/dir/?api=1"
            + "&origin=" + encodeURIComponent(origine)
            + "&destination=" + encodeURIComponent(destination)
            + "&travelmode=driving",

            "_blank"

        );

    } else {

        window.open(

            "https://www.google.com/maps/dir/?api=1"
            + "&destination=" + encodeURIComponent(destination)
            + "&travelmode=driving",

            "_blank"

        );

    }

}
function ouvrirWaze(
    latitudeStation,
    longitudeStation
) {

    window.open(

        "https://waze.com/ul?ll="
        + latitudeStation
        + ","
        + longitudeStation
        + "&navigate=yes",

        "_blank"

    );

}
</script>
</body>

</html>
